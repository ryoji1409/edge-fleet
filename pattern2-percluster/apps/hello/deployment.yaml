apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-pattern2
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels: { app: hello-pattern2 }
  template:
    metadata:
      labels: { app: hello-pattern2 }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: content
          configMap:
            name: hello-content-pattern2
            items:
              - key: index.html
                path: index.html
