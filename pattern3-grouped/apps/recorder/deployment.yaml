apiVersion: apps/v1
kind: Deployment
metadata:
  name: recorder
  namespace: edge-apps
spec:
  replicas: 1
  selector:
    matchLabels: { app: recorder }
  template:
    metadata:
      labels: { app: recorder }
    spec:
      containers:
        - name: recorder
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          # 録画/イベント蓄積の擬似: 定期的にローカルにレコードを書く
          command: ["/bin/sh","-c"]
          args:
            - |
              echo "recorder started (role=all-edges)";
              while true; do
                echo "$(date -u +%FT%TZ) event captured" >> /data/events.log;
                sleep 30;
              done
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
